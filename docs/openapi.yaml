      summary: Create invoice
      description: Creates an invoice for a repair order. The total amount is calculated by the server from the repair order's labor cost, parts, and services, and returned in `data`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceRequest'
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Invoice created
                  data:
                    type: number
                    format: float
                    description: Total invoice amount.
                    example: 705.88
        "400":
          description: Invalid request
    get:
      tags:
